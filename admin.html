<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gieo Quẻ AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0c1222; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #f1c40f; text-align: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #e67e22; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ccc; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #555; background: #000; color: #fff; box-sizing: border-box; }
        .btn { padding: 10px 20px; background: #f1c40f; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #f39c12; }
        .api-key-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .api-key-row span { font-weight: bold; width: 60px; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0c1222; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #1a2235; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 300px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: rgba(255,215,0,0.1); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: bold; color: #f1c40f; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        th { color: #f1c40f; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="form-group">
                <input type="text" id="adminEmail" placeholder="Email Admin">
            </div>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Mật khẩu" style="width:100%; padding:10px; box-sizing:border-box;">
            </div>
            <button class="btn" onclick="loginAdmin()" style="width:100%">Đăng Nhập</button>
        </div>
    </div>

    <div class="container" id="admin-content" style="display: none;">
        <h1>⚙️ Bảng Điều Khiển Admin</h1>

        <div class="card">
            <h2>📊 Thống Kê Hôm Nay</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div>Tổng số User</div>
                    <div class="stat-val" id="statUsers">0</div>
                </div>
                <div class="stat-box">
                    <div>Lượt luận quẻ</div>
                    <div class="stat-val" id="statQueries">0</div>
                </div>
                <div class="stat-box">
                    <div>Xu tiêu thụ</div>
                    <div class="stat-val" id="statXu">0</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🔑 Quản Lý API Keys (Gemini)</h2>
            <p style="color:#aaa; font-size:0.9rem">Nhập tối đa 5 API Keys. Hệ thống sẽ tự xoay vòng khi hết Quota (lỗi 429).</p>
            <div id="apiKeysContainer">
                <!-- Injected via JS -->
            </div>
            <button class="btn" onclick="saveApiKeys()">Lưu API Keys</button>
        </div>

        <div class="card">
            <h2>👥 Quản Lý Người Dùng & Cộng Xu</h2>
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="text" id="targetUserId" placeholder="Nhập User ID (copy từ bảng dưới)">
                <input type="number" id="targetXuAmount" placeholder="Số lượng xu (+/-)">
                <button class="btn" onclick="updateUserXu()">Thực Hiện</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Số Xu</th>
                        <th>Quyền</th>
                        <th>Ngày tạo</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
